    category: wanfang
  - url: "https://apps.wanfangdata.com.cn/perios/rss/gdjyyj"
    name: "高等教育研究"
    language: zh
    category: wanfang
  - url: "https://apps.wanfangdata.com.cn/perios/rss/qhdxjyyj"
