# 教育内容采集源配置
# 由 edu-broadcast skill 的采集脚本读取

# --- 论文搜索关键词 ---
paper_queries:
  - query: "AI in education"
    sources: [semantic_scholar, google_scholar, arxiv]
  - query: "adaptive learning"
    sources: [semantic_scholar, google_scholar]
  - query: "intelligent tutoring system"
    sources: [semantic_scholar, arxiv]
  - query: "learning analytics"
    sources: [semantic_scholar, google_scholar]
  - query: "educational technology"
    sources: [semantic_scholar, google_scholar]
  - query: "教育信息化"
    sources: [google_scholar]
  - query: "智慧教育"
    sources: [google_scholar]
  - query: "在线教育"
    sources: [google_scholar]

paper_settings:
  max_results_per_query: 5
  days_lookback: 7

# --- 期刊 RSS 订阅源 ---
