rss_settings:
  days_lookback: 0   # 0 = 不按日期过滤，依赖去重系统；cron 每日运行时传 --days 1
  timeout: 20

news_settings:
  days_lookback: 7

# --- 新闻 RSS 源（feedparser 解析，由 collect_news.py 处理）---
rss_news:
  - url: "https://www.edsurge.com/feed.xml"
    name: "EdSurge"
    language: en

# --- Google News 搜索（已禁用：raw_text 质量差，仅返回标题复述）---
google_news_queries: []

google_news_settings:
  max_results_per_query: 8
  period: "1d"

# --- 定向抓取网站 ---
scrape_targets: []
